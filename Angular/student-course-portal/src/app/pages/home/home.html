<h1>{{ portalName }}</h1>

<p>Welcome to the Student Course Portal.</p>

<p>Browse available courses and manage your enrollments.</p>

<hr>

<h3>Portal Statistics</h3>

Courses Available: {{ courseCount }}
<p>Enrolled : 3</p>
<p>GPA : 3.8</p>

<hr>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<hr>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Search course">

<p>Searching for: {{ searchTerm }}</p>

<hr>

<app-course-card
  [courseName]="selectedCourse"
  (enrollClicked)="onCourseEnroll($event)">
</app-course-card>

<hr>

<app-course-summary-widget></app-course-summary-widget>
